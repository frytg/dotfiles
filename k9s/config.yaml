# k9s configuration
# Docs: https://k9scli.io/topics/config/
k9s:
  # Periodic refresh of resource browser windows. Default false.
  liveViewAutoRefresh: false
  # UI poll interval in seconds. Default 2.
  refreshRate: 2
  # Retries when the API server connection drops. Default 15.
  maxConnRetry: 5
  # Disable mutating commands (delete/edit/kill). Default false.
  readOnly: false
  # Stay running when CTRL-C is pressed. Default false.
  noExitOnCtrlC: false
  ui:
    enableMouse: false
    headless: false
    logoless: true
    crumbsless: false
    reactive: true
    noIcons: false
    defaultsToFullScreen: false
  skipLatestRevCheck: false
  disablePodCounting: false
  shellPod:
    image: busybox:1.35.0
    namespace: default
    limits:
      cpu: 100m
      memory: 100Mi
  imageScans:
    enable: false
    exclusions:
      namespaces: []
      labels: {}
  logger:
    tail: 100
    buffer: 5000
    sinceSeconds: -1
    textWrap: false
    showTime: false
  thresholds:
    cpu:
      critical: 90
      warn: 70
    memory:
      critical: 90
      warn: 70
