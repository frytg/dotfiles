# Mirror pushes from Tangled to the legacy GitHub remote.
# Add a deploy key with write access to github.com/frytg/dotfiles as
# GITHUB_DEPLOY_KEY under the repo's Settings → Secrets, and assign a
# spindle under Settings → Spindles.

when:
  - event: ["push", "manual"]
    branch: ["main"]

engine: nixery

clone:
  depth: 1

dependencies:
  nixpkgs:
    - git
    - openssh

steps:
  - name: "Mirror to GitHub"
    command: |
      set -euo pipefail

      if [ -z "${GITHUB_DEPLOY_KEY:-}" ]; then
        echo "GITHUB_DEPLOY_KEY not set — skipping (add under Settings → Secrets)"
        exit 0
      fi

      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      printf '%s\n' "$GITHUB_DEPLOY_KEY" > ~/.ssh/github_deploy
      chmod 600 ~/.ssh/github_deploy
      ssh-keyscan -p 443 ssh.github.com >> ~/.ssh/known_hosts 2>/dev/null || true
      export GIT_SSH_COMMAND="ssh -i ~/.ssh/github_deploy -o IdentitiesOnly=yes -p 443"

      github_remote="git@ssh.github.com:frytg/dotfiles.git"
      # Fast-forward push: Tangled is source of truth.
      git push "$github_remote" "${TANGLED_SHA}:refs/heads/${TANGLED_REF_NAME}"
