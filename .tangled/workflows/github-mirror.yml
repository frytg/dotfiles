# Mirror pushes from Tangled to github.com/frytg/dotfiles.
# Add GITHUB_DEPLOY_KEY under Settings → Secrets and assign a spindle.

when:
  - event: ["push", "manual"]
    branch: ["main"]

engine: nixery

clone:
  depth: 10

dependencies:
  nixpkgs:
    - git
    - openssh

steps:
  - name: "Mirror to GitHub"
    command: |
      set -euo pipefail

      if [ -z "${GITHUB_DEPLOY_KEY:-}" ]; then
        echo "GITHUB_DEPLOY_KEY not set — skipping"
        exit 0
      fi

      echo "TANGLED_REF_NAME: ${TANGLED_REF_NAME}"
      echo "TANGLED_SHA: ${TANGLED_SHA}"

      mkdir -p ~/.ssh
      touch ~/.ssh/known_hosts
      eval "$(ssh-agent -s)" > /dev/null
      ssh-add - <<< "$GITHUB_DEPLOY_KEY"
      ssh-keyscan -t rsa,ed25519 github.com >> ~/.ssh/known_hosts

      git config user.name "Daniel Freytag"
      git config user.email "daniel@frytg.com"
      git remote add mirror git@github.com:frytg/dotfiles.git
      git push --force mirror "${TANGLED_SHA}:refs/heads/${TANGLED_REF_NAME}"
