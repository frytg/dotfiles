# Mirror pushes from Tangled to github.com/frytg/dotfiles.
# Add GITHUB_DEPLOY_KEY under Settings → Secrets and assign a spindle.

when:
  - event: ["push", "manual"]
    branch: ["main"]

engine: nixery

clone:
  depth: 40

dependencies:
  nixpkgs:
    - git
    - openssh

environment:
  GIT_REMOTE_REPO: "git@github.com:frytg/dotfiles.git"

steps:
  - name: "Mirror to GitHub"
    command: |
      set -euo pipefail

      if [ -z "${GITHUB_DEPLOY_KEY:-}" ]; then
        echo "GITHUB_DEPLOY_KEY not set — skipping"
        exit 0
      fi

      echo "TANGLED_REF_NAME: ${TANGLED_REF_NAME}"
      echo "TANGLED_SHA: ${TANGLED_SHA}"
      echo "HEAD: $(git rev-parse HEAD)"
      echo "GIT_REMOTE_REPO: ${GIT_REMOTE_REPO}"

      uid="$(id -u)"
      gid="$(id -g)"
      export HOME="/tmp/ci-${uid}"
      mkdir -p "$HOME"

      # Nixery images may run without a passwd entry for the current uid;
      # OpenSSH refuses to start without one.
      echo "root:x:0:0:root:/root:/bin/sh" >> /etc/passwd

      touch "/etc/ssh/known_hosts"
      eval "$(ssh-agent -s)" > /dev/null
      ssh-add - <<< "${GITHUB_DEPLOY_KEY}"
      ssh-keyscan -t rsa,ed25519 github.com >> "/etc/ssh/known_hosts"

      git config user.name "Daniel Freytag"
      git config user.email "ci@frytg.digital"
      git remote add mirror "${GIT_REMOTE_REPO}"
      git push mirror --all
      git push mirror --tags
